services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eduagent
      POSTGRES_PASSWORD: eduagent
      POSTGRES_DB: eduagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduagent-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduagent-net

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://eduagent:eduagent@postgres:5432/eduagent
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:80,http://localhost:8080,http://localhost:5173
      KNOWLEDGE_DIR: /app/knowledge
      CHROMA_PERSIST_DIR: /app/vector_db/chroma
      AUTO_INGEST_ON_STARTUP: "false"
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - vector_db:/app/vector_db
      - knowledge:/app/knowledge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - eduagent-net

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - eduagent-net

volumes:
  pgdata:
  redisdata:
  vector_db:
  knowledge:

networks:
  eduagent-net:
    driver: bridge
